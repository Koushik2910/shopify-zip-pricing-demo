<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZIP Pricing Widget — Local Test</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f9f9f9; display: flex; justify-content: center; padding: 60px 20px; }
    .product-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 40px; max-width: 480px; width: 100%; }
    .product-name { font-size: 22px; font-weight: 700; color: #111827; margin: 0 0 4px; }
    .product-sub  { font-size: 14px; color: #6b7280; margin: 0 0 24px; }
    .divider      { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
    .price-label  { font-size: 13px; color: #6b7280; margin: 0 0 4px; }
    #price-display { font-size: 32px; font-weight: 700; color: #111827; margin: 0 0 20px; transition: opacity .2s; }
    #price-display.dim { opacity: .35; }
    .input-row    { display: flex; gap: 8px; }
    input[type=text] { border: 1px solid #d1d5db; border-radius: 6px; padding: 10px 14px; font-size: 15px; width: 150px; outline: none; }
    input[type=text]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    button { background: #111827; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover    { background: #374151; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 13px; min-height: 18px; }
    .ok   { color: #16a34a; }
    .err  { color: #dc2626; }
    .wait { color: #6b7280; }
    .hint { margin-top: 28px; background: #f3f4f6; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #374151; }
    .hint strong { display: block; margin-bottom: 8px; }
    .hint code { background: #e5e7eb; padding: 2px 6px; border-radius: 4px; font-family: monospace; cursor: pointer; }
    .hint code:hover { background: #d1d5db; }
  </style>
</head>
<body>
<div class="product-card">
  <p class="product-name">Premium Wireless Headphones</p>
  <p class="product-sub">SKU: WH-1000 &nbsp;|&nbsp; In Stock</p>
  <hr class="divider" />

  <p class="price-label">Price</p>
  <p id="price-display">$1,999</p>

  <div class="input-row">
    <input type="text" id="zip-input" placeholder="Enter ZIP code" maxlength="10" />
    <button id="zip-btn" type="button">Check Price</button>
  </div>
  <p id="status"></p>

  <div class="hint">
    <strong>Click a ZIP to test:</strong>
    <code onclick="fillZip('75028')">75028</code> $1,499 &nbsp;
    <code onclick="fillZip('10001')">10001</code> $1,699 &nbsp;
    <code onclick="fillZip('90210')">90210</code> $1,799 &nbsp;
    <code onclick="fillZip('55555')">55555</code> $1,999 (default)
  </div>
</div>

<script>
  var API = 'http://localhost:8002';
  var input   = document.getElementById('zip-input');
  var btn     = document.getElementById('zip-btn');
  var priceEl = document.getElementById('price-display');
  var statusEl = document.getElementById('status');

  function fillZip(zip) {
    input.value = zip;
    input.focus();
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  function checkPrice() {
    var zip = input.value.trim();
    if (!zip) { setStatus('Please enter a ZIP code.', 'err'); return; }
    if (!/^\d{5}$/.test(zip)) { setStatus('Enter a valid 5-digit ZIP code.', 'err'); return; }

    btn.disabled = true;
    btn.textContent = 'Checking...';
    priceEl.classList.add('dim');
    setStatus('Fetching price...', 'wait');

    fetch(API + '/api/get-price', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: '123', zipCode: zip })
    })
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(d) {
      priceEl.textContent = '$' + d.price.toLocaleString('en-US');
      setStatus('Price updated for ZIP ' + zip, 'ok');
    })
    .catch(function() { setStatus('Error fetching price. Is backend running on port 8002?', 'err'); })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Check Price';
      priceEl.classList.remove('dim');
    });
  }

  btn.addEventListener('click', checkPrice);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkPrice(); });
</script>
</body>
</html>
